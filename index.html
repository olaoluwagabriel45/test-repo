<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYBEEKAY TECH HUB</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: #f4f7ff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .top-text {
      text-align: center;
      margin-bottom: 20px;
    }

    .top-text h2 {
      color: rgb(21, 97, 196);
      font-size: 28px;
    }

    .Big-con {
      width: 100%;
      background: linear-gradient(
        50deg,
        rgb(51, 22, 133) 0%,
        rgb(21, 97, 196) 100%
      );
      border-radius: 15px;
      padding: 30px 20px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
    }

    .h4 {
      text-align: center;
      color: white;
      margin-bottom: 25px;
    }

    .form input {
      width: 100%;
      height: 45px;
      border: none;
      border-radius: 8px;
      padding-left: 12px;
      margin-bottom: 15px;
      outline: none;
      font-size: 15px;
    }

    ::placeholder {
      font-size: 14px;
      font-weight: 500;
    }

    .but,
    .signup {
      width: 100%;
      height: 45px;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .but {
      background-color: #4b4b4b;
      color: white;
      margin-bottom: 15px;
    }

    .but:hover {
      background-color: black;
    }

    .line {
      display: block;
      text-align: center;
      color: white;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .signup {
      background-color: #808080;
      color: white;
    }

    .signup:hover {
      background-color: black;
    }

    /* Mobile Responsive */
    @media (max-width: 480px) {
      .top-text h2 {
        font-size: 22px;
      }

      .Big-con {
        padding: 25px 15px;
      }

      .h4 h4 {
        font-size: 15px;
      }

      .form input,
      .but,
      .signup {
        height: 42px;
        font-size: 15px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="top-text">
      <h2>HYBEEKAY TECH HUB</h2>
    </div>

    <div class="Big-con">

      <div class="h4">
        <h4>Login to order your own Laptop...</h4>
      </div>

      <div class="form">

        <input
          class="Email"
          type="text"
          placeholder="Email or Number"
          id="email"
        />

        <input
          class="password"
          type="password"
          placeholder="Password"
          id="password"
        />

        <button onclick="logIn()" class="but">
          Log In
        </button>

        <span class="line">
          ---------------- OR ----------------
        </span>

        <button class="signup">
          Sign Up
        </button>

      </div>
    </div>
  </div>

  <script>
    const logIn = () => {

  const email = document.getElementById('email');
  const password = document.getElementById('password');

  const emailValue = email.value;
  const passwordValue = password.value;

  // GET EXISTING USERS FROM LOCAL STORAGE
  let allInput =
    JSON.parse(localStorage.getItem('users')) || [];

  if (
    emailValue.trim() === '' ||
    passwordValue.trim() === ''
  ) {

    alert('Please fill all fields!');

  } else {

    const userObj = {
      email: emailValue,
      password: passwordValue
    };

    // CHECK IF USER ALREADY EXISTS
    let found = allInput.find(
      user => user.email === userObj.email
    );

    if (found) {

      alert('User already exists!');

    } else {

      // PUSH NEW USER
      allInput.push(userObj);

      // SAVE TO LOCAL STORAGE
      localStorage.setItem(
        'users',
        JSON.stringify(allInput)
      );

      console.log(allInput);

      alert('Login Successful!');

      // CLEAR INPUTS
      email.value = '';
      password.value = '';
    }
  }
};
  </script>

</body>
</html>
